version: '3.8'  

services:  
  postgres:  
    image: postgres:13  
    restart: always  
    environment:  
      POSTGRES_DB: ecommerce  
      POSTGRES_USER: user  
      POSTGRES_PASSWORD: password  
    ports:  
      - '5432:5432'  
    volumes:  
      - postgres_data:/var/lib/postgresql/data  

  redis:  
    image: redis:6  
    restart: always  
    ports:  
      - '6379:6379'  

  elasticsearch:  
    image: elasticsearch:7  
    restart: always  
    environment:  
      discovery.type: single-node  
    ports:  
      - '9200:9200'  
    volumes:  
      - elasticsearch_data:/usr/share/elasticsearch/data  

  kibana:  
    image: kibana:7  
    restart: always  
    ports:  
      - '5601:5601'  
    environment:  
      ELASTICSEARCH_URL: http://elasticsearch:9200  

  backend:  
    build: ./backend  
    restart: always  
    environment:  
      DATABASE_URL: postgres://user:password@postgres:5432/ecommerce  
    ports:  
      - '8000:8000'  
    depends_on:  
      - postgres  

  frontend:  
    build: ./frontend  
    restart: always  
    ports:  
      - '3000:3000'  

  nginx:  
    image: nginx:latest  
    ports:  
      - '80:80'  
    volumes:  
      - ./nginx.conf:/etc/nginx/nginx.conf  
    depends_on:  
      - frontend  

volumes:  
  postgres_data:  
  elasticsearch_data:  
